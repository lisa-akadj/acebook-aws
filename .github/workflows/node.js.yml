name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      # npm ci ensures a clean, consistent install from package-lock.json
      run: npm ci

    # - name: Run Lint (Optional)
    #   # This will only work if you have a "lint" script in your package.json
    #   run: npm run lint --if-present

    - name: Run Tests
      run: npm test
      env:
        CI: true
        NODE_ENV: test
        SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'super_secret' }}