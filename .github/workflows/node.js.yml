name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Start server
      run: npm start &
      env:
        NODE_ENV: test
        SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'super_secret' }}

    - name: Wait for server
      run: npx wait-on http://localhost:3030 --timeout 30000

    - name: Start test server
      run: npm run start:test

    - name: Run Tests
      run: npm test
      env:
        CI: true
        NODE_ENV: test
        SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'super_secret' }}
